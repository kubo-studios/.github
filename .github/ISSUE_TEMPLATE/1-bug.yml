name: Bug Report
description: Report an issue that should be fixed
title: "[BUG] "
labels:
  - bug

body:
  - type: input
    id: mc_version
    attributes:
      label: Minecraft Version
      placeholder: e.g., 1.21.100
    validations:
      required: false

  - type: input
    id: pack_version
    attributes:
      label: Pack Version
      placeholder: e.g., 0.0.1
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Select your platform
      multiple: false
      default: 0
      options:
        - Windows
        - Mobile (Android)
        - Mobile (iOS)
        - Linux (WineGDK)
        - Switch
        - PS4
        - Unspecified
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description of the bug
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to '...'
        2. Click on '...'
        3. See the error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: Describe what you expected to happen.
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      placeholder: Describe what actually happened.
    validations:
      required: false

  - type: textarea
    id: media
    attributes:
      label: Screenshots, logs, or videos
      description: Drag and drop files or paste links.
    validations:
      required: false
